<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planos | Maker Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="plano.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      MAKER<span>Hub</span>
    </div>

    <nav>
      <a href="../index.html">Criar novo</a>

      <!-- ALTERADO -->
      <a href="projeto.html">Meus projetos</a>

      <a href="#" class="active">Planos</a>

      <a href="perfil.html" class="profile">
        <img src="../images/User.png" alt="">
        Perfil
      </a>
    </nav>
  </header>

  <main class="plans-wrapper">
    <div class="plans-box">
      <h1>Planos</h1>

      <div class="cards">

        <div class="card">
          <div class="card-top">
            <h3>15 Tokens</h3>
            <div class="token-icon one">
              <span></span>
            </div>
          </div>

          <div class="price">
            R$ 75,00
          </div>
        </div>


        <div class="card">
          <div class="card-top">
            <h3>30 Tokens</h3>
            <div class="token-icon two">
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="price">
            R$ 150,00
          </div>
        </div>


        <div class="card">

          <div class="popular">
            POPULAR
          </div>

          <div class="card-top">
            <h3>50 Tokens</h3>
            <div class="token-icon three">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="price">
            R$ 250,00
          </div>

        </div>

      </div>
    </div>
  </main>

  <script src="plano.js"></script>

</body>
</html>
