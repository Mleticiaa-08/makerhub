<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Resultado</title>
  <link rel="stylesheet" href="resultado.css">
</head>
<body>

<header class="topbar">
  <div class="logo">MAKER<span>Hub</span></div>

  <nav>
    <a href="#" data-link="home">Criar novo</a>
    <a href="#" data-link="projeto">Meus projetos</a>
    <a href="#" data-link="plano">Planos</a>
    <a href="#" class="perfil" data-link="perfil">Perfil</a>
  </nav>
</header>

<main class="container">

  <div class="title-area">
    <p class="subtitle">RESULTADO GERADO POR I.A</p>
    <h1>Resultado:</h1>

    <div class="actions">
      <button class="btn ghost">Salvar</button>
      <button class="btn primary">Publicar</button>
    </div>
  </div>

  <div class="preview">

    <div class="browser-bar">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      <input type="text" value="makerhub.com.br/amor-e-celebracao">
      <span class="status">Gerado</span>
    </div>

    <div class="site">

      <header class="site-header">
        <h2>Apollo Rigor</h2>
        <div class="right">
          <span>Buscar</span>
          <button class="cart">Sacola</button>
        </div>
      </header>

      <section class="hero">
        <div class="hero-text">
          <span class="tag">COLEÇÃO 2025</span>
          <h1>Viva o dia<br>mais especial</h1>
          <button>Ver coleção →</button>
        </div>

        <div class="hero-info">
          <p>✔ Frete grátis acima de R$500</p>
          <p>✔ Troca em 30 dias</p>
        </div>
      </section>

      <div class="categories">
        <button>Todos</button>
        <button>Vestidos</button>
        <button class="active">Ternos</button>
        <button>Véus & Tiaras</button>
        <button>Joias</button>
        <button>Sapatos</button>
        <button>Acessórios</button>
      </div>

      <section class="products">
        <h3>Ternos (1 itens)</h3>

        <div class="grid">
          <div class="card">
            <span class="badge">NOVO</span>
            <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" />
            <h4>Terno Clássico Slim</h4>
            <p>R$ 899,00</p>
          </div>
        </div>
      </section>

    </div>
  </div>

</main>

<script src="resultado.js"></script>
</body>
</html>
